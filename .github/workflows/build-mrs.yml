name: Auto Build MRS Rules

on:
  schedule:
    - cron: "0 2 * * *"   # 每天 UTC 时间 02:00（北京时间早上 10:00）自动执行
  workflow_dispatch:      # 允许你在网页端手动点击运行

# 关键修复：显式赋予 actions 机器人推送到仓库的写入权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: 1. 拉取当前仓库
        uses: actions/checkout@v4  # 升级到 v4，消除 Node 版本弃用警告

      - name: 2. 获取并下载最新版 Mihomo 核心
        run: |
          VERSION=$(curl -sL "https://api.github.com/repos/MetaCubeX/mihomo/releases/latest" | jq -r .tag_name)
          echo "最新 Mihomo 版本号为: $VERSION"
          DOWNLOAD_URL="https://github.com/MetaCubeX/mihomo/releases/download/${VERSION}/mihomo-linux-amd64-${VERSION}.gz"
          echo "下载链接: $DOWNLOAD_URL"
          wget -O mihomo.gz "$DOWNLOAD_URL"
          gunzip mihomo.gz
          chmod +x mihomo
          ./mihomo -v

      - name: 3. 下载 Loyalsoldier 规则并转换为 MRS
        run: |
          mkdir -p publish
          export NO_PROXY=*
          export http_proxy=
          export https_proxy=
          export ALL_PROXY=
          
          RULES=(
            "reject|domain"
            "icloud|domain"
            "apple|domain"
            "google|domain"
            "proxy|domain"
            "direct|domain"
            "private|domain"
            "gfw|domain"
            "tld-not-cn|domain"
            "telegramcidr|ipcidr"
            "cncidr|ipcidr"
            "lancidr|ipcidr"
          )
          
          for item in "${RULES[@]}"; do
            NAME="${item%%|*}"
            TYPE="${item##*|}"
            echo "正在转换: $NAME.txt (类型: $TYPE)..."
            wget -qO $NAME.txt https://raw.githubusercontent.com/Loyalsoldier/clash-rules/release/$NAME.txt
            ./mihomo convert-ruleset $TYPE yaml $NAME.txt publish/$NAME.mrs
          done

      - name: 4. 推送到 mrs-release 分支
        run: |
          cd publish
          git init
          git config --local user.name "github-actions[bot]"
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b mrs-release
          
          git add .
          git commit -m "Auto update MRS rules $(date +'%Y-%m-%d %H:%M')"
          git remote add origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          
          git push -f origin mrs-release
